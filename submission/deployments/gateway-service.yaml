apiVersion: apps/v1
kind: Deployment

metadata:
  name: gateway-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: gateway-service

  template:
    metadata:
      labels:
        app: gateway-service

    spec:
      containers:
        - name: gateway-service
          image: gateway-service:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 3003

          env:
            - name: NODE_ENV
              value: "production"

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"

            limits:
              memory: "256Mi"
              cpu: "200m"
